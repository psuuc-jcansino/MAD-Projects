name: cursed_realm
description: A dark gothic turn-based RPG for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  analyzer: 6.4.1
  animate_do: ^3.3.4
  audioplayers: ^6.0.0
  equatable: ^2.0.5
  flame: ^1.18.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  hive_flutter: ^1.1.0
  uuid: ^4.4.0

dev_dependencies:
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
