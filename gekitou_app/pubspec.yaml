name: gekitou_app
description: "A turn-based anime battle game with Firebase integration."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # HTTP & API calls
  http: ^1.1.0

  # State Management
  provider: ^6.1.0

  # Utilities
  uuid: ^4.0.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0

  # UI & Animation
  flutter_animate: ^4.2.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/gekitou-logo.png

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-VariableFont_wght.ttf