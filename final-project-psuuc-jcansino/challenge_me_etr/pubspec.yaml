name: challenge_me_etr
description: "Challenge Me ETR - Flutter App"

publish_to: 'none' # Private package

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  font_awesome_flutter: ^10.12.0
  intl: ^0.20.2
  path: ^1.9.1
  sqflite: ^2.4.2
  quickalert: ^1.1.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/ChallengeMeLogo.png
    - assets/images/CM.png

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700

    - family: Bahiana
      fonts:
        - asset: assets/fonts/Bahiana/Bahiana-Regular.ttf
