name: gekitou_app
description: "A turn-based anime battle game with Firebase integration."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  cloud_firestore: ^5.0.0
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.0.0
  firebase_core: ^3.0.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.2.0
  flutter_launcher_icons: ^0.14.4
  http: ^1.1.0
  intl: ^0.19.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  shimmer: ^3.0.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/gekitou-logo.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/gekitou-logo.png

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-VariableFont_wght.ttf